<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Karinderya Express Express Foods</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>





        /* ================================================================
           1. CORE BASE STYLES
           ================================================================ */
        body {
            font-family: 'Geist', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #fff;
            min-height: 100vh;
            line-height: 1.7;
            font-size: 18px;
            overflow-x: hidden;
        }

        /* ================================================================
           2. GLASS HEADER
           ================================================================ */
        header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 2000;
            width: 100%;
        }

        .left-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: auto;
            padding: 15px 20px;
        }

        .left-nav h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .left-nav ul {
            display: flex;
            gap: 25px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .left-nav a {
            color: #fff !important;
            text-decoration: none;
            opacity: 0.8;
            font-size: 15px;
            transition: 0.3s ease;
        }
     /* Update this section */
.left-nav a:hover, .nav-active { 
    opacity: 1 !important; 
}

/* Add this new block */
.nav-active {
    border-bottom: 2px solid #ff4d4d;
    padding-bottom: 5px; /* Creates space between text and line */
}
        /* ================================================================
           3. CATEGORIES
           ================================================================ */
        .categories {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            overflow-x: auto;
            white-space: nowrap;
        }
        

   



        .categories::-webkit-scrollbar { display: none; }

        .categories button {
            padding: 10px 22px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 30px;
            font-family: 'Geist';
            font-weight: 500;
            transition: 0.3s;
        }

        .categories button.active {
            background: linear-gradient(135deg, #ff512f, #dd2476);
            border: none;
            box-shadow: 0 4px 15px rgba(221, 36, 118, 0.3);
        }

        /* ================================================================
           4. MAIN CONTENT & CARDS
           ================================================================ */
        .main-container {
            max-width: 1200px;
            margin: 20px auto;
            display: flex;
            gap: 30px;
            padding: 0 20px 50px 20px;
        }

        .menu {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 340px;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
        }

        .menu-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .menu-card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
        }

        .menu-card h3 { margin: 0; font-size: 17px; font-weight: 600; min-height: 44px; }
        .menu-card p { margin: 5px 0; color: #ff512f; font-weight: 600; font-size: 18px; }

        .add-btn {
            background: linear-gradient(135deg, #ff512f, #dd2476);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        /* ================================================================
           5. CART SIDEBAR
           ================================================================ */
        .cart {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .total-display {
            font-size: 28px;
            font-weight: 600;
            margin-top: 10px;
            color: #fff;
        }

        /* ================================================================
           6. ANIMATIONS & MOBILE
           ================================================================ */
        .flying-img {
            position: fixed;
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            pointer-events: none;
            border-radius: 50%;
            border: 2px solid #dd2476;
        }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; }
            .cart { position: static; width: auto; }
            .left-nav ul { display: none; }
        }

        @media (max-width: 600px) {
            .menu { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .menu-card { height: 280px; padding: 10px; }
            .menu-card img { height: 110px; }
            .menu-card h3 { font-size: 14px; min-height: 36px; }
        }

        /* Updated Logo Style */
.nav-logo {
    height: 80px;    /* Increased from 50px to 80px */
    width: auto;     /* Maintains aspect ratio */
    display: block;
    transition: transform 0.3s ease;
    filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3)); /* Adds depth */
}

.nav-logo:hover {
    transform: scale(1.05);
}

/* Adjust the header to fit the bigger logo */
header {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    position: sticky;
    top: 0;
    z-index: 2000;
    width: 100%;
    padding: 10px 0; /* Added padding to give the bigger logo room to breathe */
}

.left-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1200px;
    margin: auto;
    padding: 0 20px; /* Removed vertical padding here since header handles it */
}
    </style>
</head>
<body>

    <header>
        <div class="left-nav">
            <div class="logo-container">
    <a href="index.html">
        <img src="images/LOGO1.jpg" alt="Karinderya Express Logo" class="nav-logo">
    </a>
</div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html" class="nav-active">Menu</a></li>
                    <li><a href="aboutus.html">About Us</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="categories">
        <button onclick="filterMenu('all')" class="active">All</button>
        <button onclick="filterMenu('non-soup')">Non-Soup</button>
        <button onclick="filterMenu('soup')">Soup</button>
        <button onclick="filterMenu('fried')">Fried</button>
        <button onclick="filterMenu('drinks')">Drinks</button>
    </div>

    <div class="main-container">
        <div class="menu" id="menu"></div>

        <div class="cart">
            <h2 style="margin-top:0;">🛒 Cart</h2>
            <div id="cart-items"></div>
            <div style="border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 15px;">
                <small style="opacity:0.6;">Total Amount</small>
                <div class="total-display">₱<span id="total">0</span></div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="clearCart()" style="flex:1; background:rgba(255,255,255,0.1); color:white; border:none; padding:12px; border-radius:10px; cursor:pointer;">Clear</button>
                <button onclick="checkout()" style="flex:2; background: linear-gradient(135deg, #28a745, #218838); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">Checkout</button>
            </div>
        </div>
    </div>

    <script>
        const foods = [
            { name: "Adobo", price: 80, category: "non-soup", img: "images/adobo.jpg" },
            { name: "Adobong Kangkong with Tofu", price: 85, category: "non-soup", img: "images/Adobong Kangkong with Tofu.jpg" },
            { name: "Adobong Sitaw", price: 75, category: "non-soup", img: "images/adobong sitaw.jpg" },
            { name: "Beef Tapa", price: 120, category: "fried", img: "images/beef tapa.jpg" },
            { name: "Bicol Express", price: 110, category: "non-soup", img: "images/bicol-express.avif" },
            { name: "Buko Juice", price: 40, category: "drinks", img: "images/buko.jpg" },
            { name: "Bukopandan", price: 50, category: "drinks", img: "images/bukopanda.jpg" },
            { name: "Chicken Drumsticks", price: 95, category: "fried", img: "images/chicken drumsticks.jpg" },
            { name: "Coffee", price: 30, category: "drinks", img: "images/coffee.jpg" },
            { name: "Coke", price: 35, category: "drinks", img: "images/coke.jpg" },
            { name: "Egg", price: 20, category: "fried", img: "images/egg.jpg" },
            { name: "Fried Tofu", price: 60, category: "fried", img: "images/fried tofu.jpg" },
            { name: "Kaldereta", price: 110, category: "non-soup", img: "images/kaldereta.jpg" },
            { name: "Lebron", price: 150, category: "non-soup", img: "images/lebron.jpg" },
            { name: "Melon Juice", price: 45, category: "drinks", img: "images/melon.jpg" },
            { name: "Menudo", price: 100, category: "non-soup", img: "images/menudo.jpg" },
            { name: "Mt. Dew", price: 35, category: "drinks", img: "images/mt.dew.jpg" },
            { name: "Pinakbet", price: 85, category: "non-soup", img: "images/pinakbet.jpg" },
            { name: "Pork Belly Kare-Kare", price: 130, category: "non-soup", img: "images/PorkBellyKare-Kare.jpg" },
            { name: "Pork Bistek", price: 115, category: "non-soup", img: "images/Pork Bistek.jpg" },
            { name: "Pritong Lumpiang Toque", price: 70, category: "fried", img: "images/prito-lumpiang-togue.jpg" },
            { name: "Rice", price: 15, category: "non-soup", img: "images/rice.jpg" },
            { name: "Sagot Gulaman", price: 30, category: "drinks", img: "images/sagotgulaman.jpg" },
            { name: "Shanghai", price: 80, category: "fried", img: "images/shanghai.jpg" },
            { name: "Sinigang na Baboy", price: 120, category: "soup", img: "images/sinigangnababoy.jpg" },
            { name: "Sprite", price: 35, category: "drinks", img: "images/sprite.jpg" },
            { name: "Sting", price: 25, category: "drinks", img: "images/sting.jpg" },
            { name: "Tilapia", price: 95, category: "fried", img: "images/tilapia.jpg" }
        ];

        let cart = JSON.parse(localStorage.getItem("cart")) || {};

        function displayMenu(filter = "all") {
            const menu = document.getElementById("menu");
            menu.innerHTML = "";
            foods.forEach(food => {
                if (filter === "all" || food.category === filter) {
                    menu.innerHTML += `
                        <div class="menu-card">
                            <img src="${food.img}" alt="${food.name}">
                            <div class="menu-card-content">
                                <h3>${food.name}</h3>
                                <p>₱${food.price}</p>
                                <button class="add-btn" onclick="addToCart('${food.name}', ${food.price}, '${food.img}')">ADD TO CART</button>
                            </div>
                        </div>`;
                }
            });
        }

        function filterMenu(category) {
            document.querySelectorAll(".categories button").forEach(btn => btn.classList.remove("active"));
            event.target.classList.add("active");
            displayMenu(category);
        }

        function addToCart(name, price, img) {
            if (!cart[name]) cart[name] = { price: price, qty: 1, img: img };
            else cart[name].qty++;
            updateCart();
            animateFlyingItem(event);
        }

        function animateFlyingItem(e) {
            const btn = e.target;
            const card = btn.closest('.menu-card');
            const itemImg = card.querySelector('img');
            const cartBox = document.querySelector('.cart');
            const flyingImg = itemImg.cloneNode(true);
            flyingImg.classList.add('flying-img');
            document.body.appendChild(flyingImg);
            const imgRect = itemImg.getBoundingClientRect();
            const cartRect = cartBox.getBoundingClientRect();
            flyingImg.style.left = imgRect.left + "px";
            flyingImg.style.top = imgRect.top + "px";
            flyingImg.style.width = imgRect.width + "px";
            setTimeout(() => {
                flyingImg.style.left = cartRect.left + "px";
                flyingImg.style.top = cartRect.top + "px";
                flyingImg.style.width = "40px";
                flyingImg.style.height = "40px";
                flyingImg.style.opacity = "0";
            }, 50);
            setTimeout(() => flyingImg.remove(), 700);
        }

        function updateCart() {
            const cartDiv = document.getElementById("cart-items");
            cartDiv.innerHTML = "";
            let total = 0;
            for (let item in cart) {
                total += cart[item].price * cart[item].qty;
                cartDiv.innerHTML += `
                    <div class="cart-item">
                        <span>${item} (x${cart[item].qty})</span>
                        <div style="display:flex; gap:5px;">
                            <button onclick="changeQty('${item}', -1)" style="padding:0 5px; cursor:pointer;">-</button>
                            <button onclick="changeQty('${item}', 1)" style="padding:0 5px; cursor:pointer;">+</button>
                        </div>
                    </div>`;
            }
            document.getElementById("total").innerText = total.toLocaleString();
            localStorage.setItem("cart", JSON.stringify(cart));
        }

        function changeQty(item, change) {
            if (cart[item].qty + change <= 0) delete cart[item];
            else cart[item].qty += change;
            updateCart();
        }

        function checkout() {
            if (Object.keys(cart).length === 0) return alert("Cart is empty!");
            window.location.href = "checkout.html";
        }

        function clearCart() {
            if (confirm("Clear your cart?")) {
                cart = {};
                updateCart();
            }
        }

        displayMenu();
        updateCart();
    </script>
</body>
</html>
