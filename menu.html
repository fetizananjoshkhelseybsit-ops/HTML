<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Karinderya Express Foods</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        /* ================================================================
           1. CORE BASE STYLES
           ================================================================ */
        body {
            font-family: 'Geist', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            line-height: 1.7;
            font-size: 18px;
            overflow-x: hidden;
        }

        /* ================================================================
           2. FIXED HEADER
           ================================================================ */
        header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 2000;
            width: 100%;
            padding: 10px 0;
        }

        .left-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: auto;
            padding: 0 20px;
        }

        .nav-logo {
            height: 80px;
            width: auto;
            display: block;
            transition: transform 0.3s ease;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3));
        }

        .nav-logo:hover { transform: scale(1.05); }

        .left-nav ul {
            display: flex;
            gap: 25px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .left-nav a {
            color: #fff !important;
            text-decoration: none;
            opacity: 0.8;
            font-size: 15px;
            transition: 0.3s ease;
        }

        .left-nav a:hover, .nav-active { 
            opacity: 1 !important; 
        }

        .nav-active {
            border-bottom: 2px solid #ff4d4d;
            padding-bottom: 5px;
        }

        /* ================================================================
           3. CATEGORIES
           ================================================================ */
        .categories {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            overflow-x: auto;
            white-space: nowrap;
        }

        .categories::-webkit-scrollbar { display: none; }

        .categories button {
            padding: 10px 22px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 30px;
            font-family: 'Geist';
            font-weight: 500;
            transition: 0.3s;
        }

        .categories button.active {
            background: linear-gradient(135deg, #ff512f, #dd2476);
            border: none;
            box-shadow: 0 4px 15px rgba(221, 36, 118, 0.3);
        }

        /* ================================================================
           4. MENU CARDS (STRICT LAYOUT)
           ================================================================ */
        .main-container {
            max-width: 1200px;
            margin: 20px auto;
            display: flex;
            gap: 30px;
            padding: 0 20px 50px 20px;
        }

        .menu {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 400px; 
            box-sizing: border-box;
            overflow: hidden; 
        }

        .menu-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
            border-color: #ff4d4d;
        }

        .menu-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .menu-card-content {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            flex-grow: 1; 
            text-align: center;
        }

        .menu-card h3 { 
            margin: 0 0 5px 0; 
            font-size: 17px; 
            font-weight: 600;
            height: 50px; 
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            overflow: hidden;
        }

        .menu-card p { 
            margin: 5px 0; 
            color: #ff512f; 
            font-weight: 600;
            font-size: 18px;
        }

        .add-btn {
            background: linear-gradient(135deg, #ff512f, #dd2476);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: auto; 
            width: 100%;
            flex-shrink: 0;
        }

        /* ================================================================
           5. CART SIDEBAR
           ================================================================ */
        .cart {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 120px;
            height: fit-content;
            min-width: 300px;
            backdrop-filter: blur(15px);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 8px;
        }

        .total-display {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        /* ================================================================
           6. NOTIFICATION MODAL
           ================================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: #2c2a3a;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-btn-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Geist';
        }

        .btn-no { background: rgba(255,255,255,0.1); color: white; }
        .btn-yes { background: #ff4d4d; color: white; }

        /* ================================================================
           7. FLOATING CART ICON (NEW ADDITION)
           ================================================================ */
        .floating-cart {
            display: none; /* Hidden on Desktop */
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff512f, #dd2476);
            border-radius: 50%;
            z-index: 2500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            cursor: pointer;
            display: none; /* Switch to flex in media query */
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.2s;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .floating-cart:active { transform: scale(0.9); }

        .floating-cart i { color: white; font-size: 22px; }

        .badge-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: white;
            color: #dd2476;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* ================================================================
           8. MOBILE RESPONSIVE
           ================================================================ */
        @media (max-width: 768px) {
            .floating-cart { display: flex; } /* Show icon on Mobile */
            .left-nav { flex-direction: column; gap: 15px; padding: 15px 10px; }
            .left-nav ul { gap: 15px; width: 100%; justify-content: center; }
            .main-container { flex-direction: column; }
            .cart { position: static; width: auto; min-width: 0; }
            .menu { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .menu-card { height: 380px; padding: 10px; }
            .menu-card img { height: 120px; }
            .menu-card h3 { font-size: 15px; height: 45px; }
        }

        .flying-img {
            position: fixed;
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            pointer-events: none;
            border-radius: 50%;
            border: 2px solid #dd2476;
        }
    </style>
</head>
<body>

    <header>
        <div class="left-nav">
            <div class="logo-container">
                <a href="index.html">
                    <img src="images/LOGO1.jpg" alt="Karinderya Express Logo" class="nav-logo">
                </a>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html" class="nav-active">Menu</a></li>
                    <li><a href="aboutus.html">About Us</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <a href="javascript:void(0)" class="floating-cart" id="floatingCart" onclick="scrollToCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="badge-count" id="mobile-badge">0</span>
    </a>

    <div id="clearModal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="margin-top:0; color:#ff4d4d;">Clear Tray?</h2>
            <p style="opacity:0.8;">Are you sure you want to remove all items from your current order?</p>
            <div class="modal-btn-container">
                <button class="modal-btn btn-no" onclick="closeClearModal()">Cancel</button>
                <button class="modal-btn btn-yes" onclick="confirmClearCart()">Yes, Clear</button>
            </div>
        </div>
    </div>

    <div class="categories">
        <button onclick="filterMenu('all', event)" class="active">All</button>
        <button onclick="filterMenu('non-soup', event)">Non-Soup</button>
        <button onclick="filterMenu('soup', event)">Soup</button>
        <button onclick="filterMenu('fried', event)">Fried</button>
        <button onclick="filterMenu('drinks', event)">Drinks</button>
    </div>

    <div class="main-container">
        <div class="menu" id="menu"></div>

        <div class="cart" id="cartContainer">
            <h2 style="margin-top:0;">🛒 Cart</h2>
            <div id="cart-items"></div>
            <div style="border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 15px;">
                <small style="opacity:0.6;">Total Amount</small>
                <div class="total-display">₱<span id="total">0</span></div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="openClearModal()" style="flex:1; background:rgba(255,255,255,0.1); color:white; border:none; padding:12px; border-radius:10px; cursor:pointer;">Clear</button>
                <button onclick="checkout()" style="flex:2; background: linear-gradient(135deg, #28a745, #218838); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">Checkout</button>
            </div>
        </div>
    </div>

    <script>
        const foods = [
            { name: "Adobo", price: 80, category: "non-soup", img: "images/adobo.jpg" },
            { name: "Adobong Kangkong with Tofu", price: 85, category: "non-soup", img: "images/Adobong Kangkong with Tofu.jpg" },
            { name: "Adobong Sitaw", price: 75, category: "non-soup", img: "images/adobong sitaw.jpg" },
            { name: "Beef Tapa", price: 120, category: "fried", img: "images/beef tapa.jpg" },
            { name: "Bicol Express", price: 110, category: "non-soup", img: "images/bicol-express.avif" },
            { name: "Buko Juice", price: 40, category: "drinks", img: "images/buko.jpg" },
            { name: "Bukopandan", price: 50, category: "drinks", img: "images/bukopanda.jpg" },
            { name: "Chicken Drumsticks", price: 95, category: "fried", img: "images/chicken drumsticks.jpg" },
            { name: "Coffee", price: 30, category: "drinks", img: "images/coffee.jpg" },
            { name: "Coke", price: 35, category: "drinks", img: "images/coke.jpg" },
            { name: "Egg", price: 20, category: "fried", img: "images/egg.jpg" },
            { name: "Fried Tofu", price: 60, category: "fried", img: "images/fried tofu.jpg" },
            { name: "Kaldereta", price: 110, category: "non-soup", img: "images/kaldereta.jpg" },
            { name: "Lebron", price: 150, category: "non-soup", img: "images/lebron.jpg" },
            { name: "Melon Juice", price: 45, category: "drinks", img: "images/melon.jpg" },
            { name: "Menudo", price: 100, category: "non-soup", img: "images/menudo.jpg" },
            { name: "Mt. Dew", price: 35, category: "drinks", img: "images/mt.dew.jpg" },
            { name: "Pinakbet", price: 85, category: "non-soup", img: "images/pinakbet.jpg" },
            { name: "Pork Belly Kare-Kare", price: 130, category: "non-soup", img: "images/PorkBellyKare-Kare.jpg" },
            { name: "Pork Bistek", price: 115, category: "non-soup", img: "images/Pork Bistek.jpg" },
            { name: "Pritong Lumpiang Toque", price: 70, category: "fried", img: "images/prito-lumpiang-togue.jpg" },
            { name: "Rice", price: 15, category: "non-soup", img: "images/rice.jpg" },
            { name: "Sagot Gulaman", price: 30, category: "drinks", img: "images/sagotgulaman.jpg" },
            { name: "Shanghai", price: 80, category: "fried", img: "images/shanghai.jpg" },
            { name: "Sinigang na Baboy", price: 120, category: "soup", img: "images/sinigangnababoy.jpg" },
            { name: "Sprite", price: 35, category: "drinks", img: "images/sprite.jpg" },
            { name: "Sting", price: 25, category: "drinks", img: "images/sting.jpg" },
            { name: "Tilapia", price: 95, category: "fried", img: "images/tilapia.jpg" }
        ];

        let cart = JSON.parse(localStorage.getItem("cart")) || {};

        function displayMenu(filter = "all") {
            const menu = document.getElementById("menu");
            menu.innerHTML = "";
            foods.forEach(food => {
                if (filter === "all" || food.category === filter) {
                    menu.innerHTML += `
                        <div class="menu-card">
                            <img src="${food.img}" alt="${food.name}" onerror="this.src='https://via.placeholder.com/150'">
                            <div class="menu-card-content">
                                <h3>${food.name}</h3>
                                <p>₱${food.price}</p>
                                <button class="add-btn" onclick="addToCart('${food.name}', ${food.price}, '${food.img}', event)">ADD TO CART</button>
                            </div>
                        </div>`;
                }
            });
        }

        function filterMenu(category, event) {
            document.querySelectorAll(".categories button").forEach(btn => btn.classList.remove("active"));
            event.target.classList.add("active");
            displayMenu(category);
        }

        function addToCart(name, price, img, e) {
            if (!cart[name]) cart[name] = { price: price, qty: 1, img: img };
            else cart[name].qty++;
            updateCart();
            animateFlyingItem(e);
        }

        function animateFlyingItem(e) {
            const btn = e.target;
            const card = btn.closest('.menu-card');
            const itemImg = card.querySelector('img');
            const cartBox = document.querySelector('.cart');
            const flyingImg = itemImg.cloneNode(true);
            flyingImg.classList.add('flying-img');
            document.body.appendChild(flyingImg);
            const imgRect = itemImg.getBoundingClientRect();
            const cartRect = cartBox.getBoundingClientRect();
            
            flyingImg.style.left = imgRect.left + "px";
            flyingImg.style.top = imgRect.top + "px";
            flyingImg.style.width = imgRect.width + "px";

            setTimeout(() => {
                flyingImg.style.left = (cartRect.left + 20) + "px";
                flyingImg.style.top = (cartRect.top + 20) + "px";
                flyingImg.style.width = "40px";
                flyingImg.style.height = "40px";
                flyingImg.style.opacity = "0";
            }, 50);
            setTimeout(() => flyingImg.remove(), 700);
        }

        function updateCart() {
            const cartDiv = document.getElementById("cart-items");
            cartDiv.innerHTML = "";
            let total = 0;
            let totalItems = 0;

            for (let item in cart) {
                total += cart[item].price * cart[item].qty;
                totalItems += cart[item].qty;
                cartDiv.innerHTML += `
                    <div class="cart-item">
                        <span>${item} (x${cart[item].qty})</span>
                        <div style="display:flex; gap:5px;">
                            <button onclick="changeQty('${item}', -1)" style="padding:4px 10px; cursor:pointer; background:rgba(255,255,255,0.1); border:none; color:white; border-radius:5px;">-</button>
                            <button onclick="changeQty('${item}', 1)" style="padding:4px 10px; cursor:pointer; background:rgba(255,255,255,0.1); border:none; color:white; border-radius:5px;">+</button>
                        </div>
                    </div>`;
            }
            document.getElementById("total").innerText = total.toLocaleString();
            // Update Mobile Badge Count
            document.getElementById("mobile-badge").innerText = totalItems;
            localStorage.setItem("cart", JSON.stringify(cart));
        }

        function changeQty(item, change) {
            if (cart[item].qty + change <= 0) delete cart[item];
            else cart[item].qty += change;
            updateCart();
        }

        function checkout() {
            if (Object.keys(cart).length === 0) return alert("Cart is empty!");
            window.location.href = "checkout.html";
        }

        // SMOOTH SCROLL FUNCTION
        function scrollToCart() {
            document.getElementById("cartContainer").scrollIntoView({ behavior: 'smooth' });
        }

        function openClearModal() {
            document.getElementById("clearModal").style.display = "flex";
        }

        function closeClearModal() {
            document.getElementById("clearModal").style.display = "none";
        }

        function confirmClearCart() {
            cart = {};
            updateCart();
            closeClearModal();
        }

        displayMenu();
        updateCart();
    </script>
</body>
</html>
